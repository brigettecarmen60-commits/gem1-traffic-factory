<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gem1 流量工厂 — 关键词×代码×流量词 乘法引擎</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div>
    <h1>🎰 Gem1 流量工厂</h1>
    <span class="subtitle">乘法引擎：行业关键词 × 选题代码 × 流量词</span>
    <span class="badge">Demo</span>
  </div>
  <div class="subtitle">老D商业IP操盘系统 — 流量型选题引擎</div>
</div>

<div class="container">

  <div class="selector" id="selector">
    <button class="active" data-key="huagong">🧪 化工原材料</button>
    <button data-key="youting">🛥️ 游艇托管</button>
    <button data-key="chuchen">🏭 工业除尘</button>
  </div>

  <div class="input-section">
    <span class="prompt-label">💬 赛道</span>
    <span class="input-display" id="inputDisplay"></span>
    <span class="arrow">→</span>
    <span class="output-count">方向 × 备选方向 × 拍摄方向</span>
  </div>

  <div class="cards-grid fade-in" id="cardsGrid"></div>

  <div class="footer-cta">
    <h2>不想自己装 Claude Code？</h2>
    <p>网页版一键跑管线。输入赛道 → 自动出方向。</p>
    <a href="https://你的网页分身地址" class="cta-button" target="_blank">🚀 试试网页版</a>
    <span class="cta-secondary">开源版永远免费 · 网页版提供一键全链路</span>
  </div>

</div>

<script src="demo-data.js"></script>
<script>
let currentIndustry = 'huagong';

function renderCards() {
  const data = demoTopics[currentIndustry];
  const grid = document.getElementById('cardsGrid');

  grid.innerHTML = data.topics.map((t, i) => `
    <div class="topic-card" style="animation-delay: ${i * 0.07}s">
      <div class="card-code">${t.code}</div>
      <div class="card-title">${t.title}</div>
      <div class="section-label">↳ 备选方向</div>
      <div class="alts">
        ${t.alts.map(a => `<div class="alt-item">${a}</div>`).join('')}
      </div>
      <div class="section-label">→ 拍摄方向</div>
      <div class="shoots">
        ${t.shoots.map(s => `<div class="shoot-item">${s}</div>`).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('inputDisplay').textContent = data.input;
}

document.getElementById('selector').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  const key = e.target.dataset.key;
  if (!key || key === currentIndustry) return;
  currentIndustry = key;
  document.querySelectorAll('#selector button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('cardsGrid').classList.remove('fade-in');
  void document.getElementById('cardsGrid').offsetWidth;
  document.getElementById('cardsGrid').classList.add('fade-in');
  renderCards();
});

renderCards();
</script>

</body>
</html>
